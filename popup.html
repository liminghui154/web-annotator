<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Annotator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #4a90d9;
      color: white;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header-actions { display: flex; gap: 4px; }
    .header-actions button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .header-actions button:hover { background: rgba(255,255,255,0.35); }
    .stats {
      padding: 8px 14px;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }
    .toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .toolbar input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    .toolbar input:focus { border-color: #4a90d9; }
    .filters { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      padding: 3px 8px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      font-size: 10px;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #4a90d9; color: #4a90d9; }
    .filter-btn.active { background: #4a90d9; color: white; border-color: #4a90d9; }
    .color-filter {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-filter:hover { transform: scale(1.15); }
    .color-filter.active { border-color: #333; }
    .annotations-list { flex: 1; overflow-y: auto; }
    .annotation-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .annotation-item:hover { background: #f0f7ff; }
    .annotation-item .url {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .annotation-item .text {
      font-size: 12px;
      color: #333;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      padding-left: 6px;
      border-left: 2px solid #ffeb3b;
    }
    .annotation-item .note {
      font-size: 11px;
      color: #666;
      background: #fffde7;
      padding: 4px 6px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .annotation-item .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .annotation-item .date { font-size: 10px; color: #aaa; }
    .annotation-item .actions { display: flex; gap: 8px; }
    .annotation-item .actions button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 11px;
    }
    .annotation-item .actions button:hover { color: #4a90d9; }
    .annotation-item .actions button.delete:hover { color: #ff5252; }
    .empty-state {
      padding: 40px 14px;
      text-align: center;
      color: #bbb;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Web Annotator</h1>
    <div class="header-actions">
      <button id="btnExportMd">MD</button>
      <button id="btnExportJson">导出</button>
      <button id="btnImport">导入</button>
    </div>
  </div>
  <div class="stats" id="stats">共 0 条标注</div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索标注内容、笔记、页面...">
    <div class="filters">
      <button class="filter-btn active" data-sort="time">按时间</button>
      <button class="filter-btn" data-sort="page">按页面</button>
      <span style="border-left:1px solid #ddd;margin:0 2px;"></span>
      <span class="color-filter" data-color="" style="background:linear-gradient(135deg,#ffeb3b,#a5d6a7,#90caf9,#f48fb1);width:18px;height:18px;"></span>
      <span class="color-filter" data-color="#ffeb3b" style="background:#ffeb3b"></span>
      <span class="color-filter" data-color="#a5d6a7" style="background:#a5d6a7"></span>
      <span class="color-filter" data-color="#90caf9" style="background:#90caf9"></span>
      <span class="color-filter" data-color="#f48fb1" style="background:#f48fb1"></span>
    </div>
  </div>
  <div class="annotations-list" id="annotationsList">
    <div class="empty-state">
      <div class="icon">📝</div>
      <p style="font-size:12px;">还没有标注</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
